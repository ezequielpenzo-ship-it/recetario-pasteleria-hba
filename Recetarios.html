<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Recetarios HBA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#002F61; --offwhite:#F0E9E6; --turquoise:#007293; --teal:#06937E;
  --sidebar-w:300px; --hdr:#002F61; --txt:#1a1a1a; --bg:#f8f5f2;
  --card:#ffffff; --border:#ddd; --accent:#007293;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}
a{color:inherit;text-decoration:none}

/* ── Device selector modal ─────────────────────────── */
#dev-modal{
  position:fixed;inset:0;background:rgba(0,47,97,0.92);
  display:flex;align-items:center;justify-content:center;z-index:9999
}
#dev-modal.hidden{display:none}
.dm-box{
  background:#fff;border-radius:16px;padding:40px 32px;text-align:center;
  max-width:420px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,0.4)
}
.dm-logo{height:60px;margin-bottom:20px;object-fit:contain}
.dm-title{font-size:20px;font-weight:700;color:var(--blue);margin-bottom:6px}
.dm-sub{font-size:14px;color:#666;margin-bottom:28px}
.dm-btns{display:flex;gap:12px;justify-content:center}
.dm-btn{
  flex:1;border:2px solid var(--blue);border-radius:10px;
  padding:18px 12px;cursor:pointer;background:#fff;
  transition:.2s;display:flex;flex-direction:column;align-items:center;gap:6px
}
.dm-btn:hover{background:var(--blue);color:#fff}
.dm-btn span{font-size:32px}
.dm-btn strong{font-size:15px;color:inherit}
.dm-btn small{font-size:11px;color:#999}
.dm-btn:hover small{color:#ccc}

/* ── Hamburger (mobile only) ───────────────────────── */
#hbg{
  display:none;position:fixed;top:12px;left:12px;z-index:200;
  background:var(--blue);color:#fff;border:none;border-radius:8px;
  width:44px;height:44px;font-size:20px;cursor:pointer
}
body.mobile #hbg{display:flex;align-items:center;justify-content:center}

/* ── App wrapper ───────────────────────────────────── */
#app{display:flex;height:100vh}

/* ── Sidebar ───────────────────────────────────────── */
#sidebar{
  width:var(--sidebar-w);background:var(--blue);color:var(--offwhite);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;height:100vh
}
body.mobile #sidebar{
  position:fixed;left:0;top:0;bottom:0;z-index:100;
  transform:translateX(-100%);transition:transform .25s ease
}
body.mobile #sidebar.open{transform:translateX(0)}

#sb-top{padding:16px 14px 10px}
#sb-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
#sb-logo-row img{height:42px;object-fit:contain;border-radius:4px;background:#fff;padding:4px 6px}
.sb-hotel-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--offwhite)}

#sb-device{display:flex;gap:4px;margin-bottom:10px}
.sbd-btn{
  flex:1;font-size:10px;padding:4px;border:1px solid rgba(255,255,255,0.3);
  border-radius:4px;background:transparent;color:rgba(255,255,255,0.6);cursor:pointer
}
.sbd-btn.active{background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.6)}

#search-wrap{position:relative;margin-bottom:6px}
#search{
  width:100%;padding:8px 10px 8px 30px;border:none;border-radius:6px;
  background:rgba(255,255,255,0.12);color:#fff;font-size:13px;outline:none
}
#search::placeholder{color:rgba(255,255,255,0.5)}
#search-wrap::before{
  content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);
  font-size:12px;pointer-events:none
}

#nav{flex:1;overflow-y:auto;padding-bottom:16px}
#nav::-webkit-scrollbar{width:4px}
#nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px}

.nb{/* book header */
  padding:10px 14px 6px;font-size:11px;text-transform:uppercase;letter-spacing:1px;
  color:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;gap:6px;
  user-select:none
}
.nb:hover{color:rgba(255,255,255,0.9)}
.nb .arr{transition:.2s}
.nb.open .arr{transform:rotate(90deg)}

.nsec{/* section tabs for croutons */
  display:none;flex-wrap:wrap;gap:4px;padding:2px 14px 8px
}
.nsec.show{display:flex}
.nsec-btn{
  font-size:11px;padding:3px 8px;border-radius:12px;
  background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);
  cursor:pointer;border:none
}
.nsec-btn.active{background:var(--turquoise);color:#fff}

.nlist{/* recipe list */display:none;max-height:0;overflow:hidden;transition:max-height .3s ease}
.nlist.show{display:block;max-height:9999px}

.nitem{
  padding:7px 14px 7px 20px;font-size:13px;cursor:pointer;
  color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:6px;
  border-left:2px solid transparent;line-height:1.3
}
.nitem:hover{background:rgba(255,255,255,0.08);color:#fff}
.nitem.active{
  background:rgba(255,255,255,0.15);color:#fff;
  border-left-color:var(--turquoise)
}
.yi-badge{
  font-size:9px;background:var(--teal);color:#fff;
  padding:1px 4px;border-radius:3px;flex-shrink:0
}

/* ── Main area ─────────────────────────────────────── */
#main{flex:1;overflow-y:auto;padding:0}
body.mobile #main{padding-top:0}

#welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:40px 20px;text-align:center
}
#welcome img{height:80px;object-fit:contain;margin-bottom:24px;opacity:.6}
#welcome h2{color:var(--blue);font-size:24px;margin-bottom:8px}
#welcome p{color:#888;font-size:14px}
.hidden{display:none!important}

/* ── Recipe view ───────────────────────────────────── */
#recipe-view{padding:0}

.rv-hdr{
  background:var(--blue);color:var(--offwhite);
  padding:16px 24px 14px;position:sticky;top:0;z-index:10
}
body.mobile .rv-hdr{padding-left:66px}
.rv-breadcrumb{font-size:11px;opacity:.6;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.rv-title{font-size:20px;font-weight:700;line-height:1.2}

.rv-body{padding:20px 24px 40px}
body.mobile .rv-body{padding:16px 16px 40px}

/* ── Yield card ────────────────────────────────────── */
.yield-card{
  background:var(--teal);color:#fff;border-radius:10px;
  padding:16px 20px;margin-bottom:16px;cursor:pointer;
  transition:.2s;user-select:none
}
.yield-card:hover{filter:brightness(1.08)}
.yc-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.8;margin-bottom:6px}
.yc-main{display:flex;align-items:baseline;gap:10px}
.yc-qty{font-size:40px;font-weight:800;line-height:1}
.yc-unit{font-size:16px;font-weight:600;opacity:.9}
.yc-hint{font-size:11px;opacity:.7;margin-top:6px}
.yc-input-row{margin-top:10px;display:flex;align-items:center;gap:8px}
.yc-input{
  width:80px;padding:6px 8px;border-radius:6px;border:2px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.15);color:#fff;font-size:15px;font-weight:600;text-align:center
}
.yc-apply{
  padding:6px 12px;background:rgba(255,255,255,0.25);border:none;
  border-radius:6px;color:#fff;font-size:12px;cursor:pointer;font-weight:600
}
.yc-apply:hover{background:rgba(255,255,255,0.4)}
.yc-clear{
  font-size:11px;text-decoration:underline;cursor:pointer;opacity:.8;
  background:none;border:none;color:#fff;margin-left:4px
}

/* ── Scale panel ───────────────────────────────────── */
.scale-panel{
  background:#fff;border:1px solid #e0d8d4;border-radius:8px;
  padding:14px 16px;margin-bottom:20px
}
.sp-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:10px}
.sp-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sp-label{font-size:13px;color:#555;white-space:nowrap}
.sp-select{
  padding:6px 8px;border:1px solid #ccc;border-radius:6px;
  font-size:13px;background:#fafafa;color:var(--txt);max-width:200px
}
.sp-qty{
  width:90px;padding:6px 8px;border:1px solid #ccc;border-radius:6px;
  font-size:13px;text-align:right
}
.sp-unit{font-size:12px;color:#666}
.sp-factor{
  background:var(--turquoise);color:#fff;
  padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700;
  margin-left:auto
}
.sp-factor.base{background:#aaa}
.sp-reset{
  font-size:11px;color:var(--turquoise);cursor:pointer;
  background:none;border:none;text-decoration:underline;margin-left:4px
}

/* ── Sub-recipe sections ───────────────────────────── */
.sub-section{margin-top:20px}
.sub-section+.sub-section{margin-top:28px}
.ssh{
  background:var(--turquoise);color:#fff;
  padding:7px 14px;border-radius:6px;font-size:12px;
  font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  margin-bottom:10px
}

/* ── Ingredient table ──────────────────────────────── */
.it{width:100%;border-collapse:collapse;font-size:14px}
.it tr:nth-child(even){background:#f9f5f2}
.it tr.base-row td{font-weight:700;color:var(--blue)}
.it td{padding:6px 8px;border-bottom:1px solid #ede8e4;vertical-align:top}
.it td.nm{width:55%}
.it td.qty{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;color:#222}
.it td.unit{color:#888;font-size:12px;padding-left:4px;white-space:nowrap}
.it td.ex{color:#999;font-size:11px;font-style:italic}

/* ── Preparation text ──────────────────────────────── */
.prep{
  margin-top:12px;padding:12px 14px;background:#faf6f3;
  border-left:3px solid var(--teal);border-radius:4px;
  font-size:13px;line-height:1.7;color:#444
}

/* ── Mobile sidebar overlay ────────────────────────── */
#sb-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99
}
body.mobile #sb-overlay.show{display:block}
</style>
</head>

/* ── State ─────────────────────────────────── */
let S = {
  book: null, section: null, recIdx: -1, rec: null,
  base: null, target: null, mode: 'base',
  targetYield: null, device: 'desktop', filter: '',
  openBooks: {}
};

/* ── Device ─────────────────────────────────── */
function setDevice(d) {
  S.device = d;
  localStorage.setItem('hba_device', d);
  document.body.classList.toggle('mobile', d === 'mobile');
  document.body.classList.toggle('desktop', d === 'desktop');
  document.getElementById('dev-modal').classList.add('hidden');
  document.getElementById('sbd-desk').classList.toggle('active', d === 'desktop');
  document.getElementById('sbd-mob').classList.toggle('active',  d === 'mobile');
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('show');
}

/* ── Helpers ─────────────────────────────────── */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(v, u) {
  if (!v && v !== 0) return ['—',''];
  if (u === 'gs' || u === 'g') {
    if (v >= 1000) {
      let s = (v/1000).toPrecision(4).replace(/\.?0+$/,'');
      return [s, 'kg'];
    }
    return [Math.round(v).toString(), 'gs'];
  }
  if (u === 'lt') {
    if (v < 0.1) return [Math.round(v*1000).toString(), 'cc'];
    let s = v.toPrecision(3).replace(/\.?0+$/,'');
    return [s, 'lt'];
  }
  if (u === 'cc' || u === 'ml') {
    if (v >= 1000) {
      let s = (v/1000).toPrecision(3).replace(/\.?0+$/,'');
      return [s, 'lt'];
    }
    return [Math.round(v).toString(), 'cc'];
  }
  // u or others
  let disp = Number.isInteger(v) ? v.toString() : v.toFixed(1).replace(/\.0$/,'');
  return [disp, u];
}

function getAllIngs(rec) {
  return (rec.subRecipes || []).flatMap(sr => sr.ingredients || []);
}

function getRecipeList() {
  if (!S.book) return [];
  const bv = DATA[S.book];
  if (bv.recipes) return bv.recipes;
  if (bv.sections && S.section) return bv.sections[S.section]?.recipes || [];
  return [];
}

function getFactor() {
  if (!S.rec) return 1;
  const f = S.target / (S.base ? (getAllIngs(S.rec).find(i => i.name === S.base)?.qty || 1) : 1);
  return isNaN(f) || f <= 0 ? 1 : f;
}

/* ── Navigation ──────────────────────────────── */
function buildNav() {
  const filterLow = S.filter.toLowerCase();
  let html = '';

  for (const [bk, bv] of Object.entries(DATA)) {
    const isOpen = S.openBooks[bk];
    const recList = bv.recipes ? bv.recipes
      : (S.section && bv.sections?.[S.section] ? bv.sections[S.section].recipes : []);
    const totalCount = bv.recipes ? bv.recipes.length
      : (bv.sections ? Object.values(bv.sections).reduce((s, sec) => s + sec.recipes.length, 0) : 0);
    const filtered = recList.filter(r => !filterLow || r.name.toLowerCase().includes(filterLow));
    const isCur = S.book === bk;

    html += `<div class="nb ${isCur || filterLow ? 'open' : ''}" onclick="toggleBook('${bk}')" id="nb-${bk}">
      <span class="arr">▶</span> ${esc(bv.label)}
      <span style="margin-left:auto;font-size:10px;opacity:.5">${totalCount}</span>
    </div>`;

    // Section tabs for croutons
    if (bv.sections) {
      const secIds = Object.keys(bv.sections);
      html += `<div class="nsec ${(isCur || filterLow) ? 'show' : ''}" id="nsec-${bk}">`;
      for (const sk of secIds) {
        const active = S.book === bk && S.section === sk;
        html += `<button class="nsec-btn ${active ? 'active' : ''}" onclick="selectSection('${bk}','${sk}')">${esc(bv.sections[sk].label)}</button>`;
      }
      html += '</div>';
    }

    // Recipe list (when book is open or filter is active)
    const showList = (isCur || filterLow) && (bv.recipes ? true : !!S.section);
    const listRecs = bv.recipes ? bv.recipes
      : (S.book === bk && S.section ? bv.sections[S.section]?.recipes || [] : []);
    const showFiltered = listRecs.filter(r => !filterLow || r.name.toLowerCase().includes(filterLow));

    if (showList || (filterLow && showFiltered.length)) {
      html += `<div class="nlist show" id="nl-${bk}">`;
      showFiltered.forEach((r, i) => {
        const realIdx = listRecs.indexOf(r);
        const active = S.book === bk && S.rec?.name === r.name;
        const yi = r.yields && r.yields.length ? '<span class="yi-badge">R</span>' : '';
        const si = r.hasSubRecipes ? '<span class="yi-badge" style="background:var(--turquoise)">S</span>' : '';
        html += `<div class="nitem ${active ? 'active' : ''}" onclick="pickRecipe('${bk}',${realIdx})" title="${esc(r.name)}">${esc(r.name)}${yi}${si}</div>`;
      });
      html += '</div>';
    }
  }

  document.getElementById('nav').innerHTML = html;
  // Restore open state for nb headers
  for (const [bk] of Object.entries(DATA)) {
    const nb = document.getElementById('nb-' + bk);
    if (nb && (S.openBooks[bk] || S.book === bk || S.filter)) nb.classList.add('open');
  }
}

function toggleBook(bk) {
  const bv = DATA[bk];
  S.book = bk;
  S.openBooks[bk] = !S.openBooks[bk];
  if (bv.sections && !S.section) {
    S.section = Object.keys(bv.sections)[0];
  }
  buildNav();
}

function selectSection(bk, sk) {
  S.book = bk; S.section = sk;
  S.openBooks[bk] = true;
  S.rec = null; S.recIdx = -1;
  document.getElementById('recipe-view').classList.add('hidden');
  document.getElementById('welcome').classList.remove('hidden');
  buildNav();
}

function pickRecipe(bk, idx, _name) {
  S.book = bk;
  const bv = DATA[bk];
  if (bv.sections && !S.section) S.section = Object.keys(bv.sections)[0];
  const list = bv.recipes ? bv.recipes : bv.sections[S.section].recipes;
  S.rec = list[idx];
  S.recIdx = parseInt(idx);
  const allIngs = getAllIngs(S.rec);
  S.base = S.rec.baseIngredient || (allIngs[0]?.name);
  const bi = allIngs.find(i => i.name === S.base);
  S.target = bi ? bi.qty : null;
  S.mode = 'base';
  S.targetYield = S.rec.yields?.[0]?.qty || null;
  renderRecipe();
  if (S.device === 'mobile') closeSidebar();
  buildNav();
}

function doSearch(val) {
  S.filter = val.trim();
  // When filter is active, show all books
  if (S.filter) {
    for (const bk of Object.keys(DATA)) S.openBooks[bk] = true;
    // For croutons, show all sections
    if (!S.section && DATA.croutons?.sections) S.section = Object.keys(DATA.croutons.sections)[0];
  }
  buildNav();
}

/* ── Recipe rendering ────────────────────────── */
function renderIngTable(ings, factor, baseIng) {
  if (!ings || !ings.length) return '';
  let rows = ings.map(ing => {
    const sv = factor ? ing.qty * factor : ing.qty;
    const [qs, us] = fmt(sv, ing.unit);
    const isBase = ing.name === baseIng;
    const ex = ing.extra ? `<td class="ex">${esc(ing.extra)}</td>` : '<td></td>';
    return `<tr class="${isBase ? 'base-row' : ''}">
      <td class="nm">${esc(ing.name)}</td>
      <td class="qty">${qs}</td>
      <td class="unit">${us}</td>
      ${ex}
    </tr>`;
  }).join('');
  return `<table class="it"><tbody>${rows}</tbody></table>`;
}

function renderRecipe() {
  const rec = S.rec;
  if (!rec) return;
  document.getElementById('welcome').classList.add('hidden');
  const rv = document.getElementById('recipe-view');
  rv.classList.remove('hidden');

  const bv = DATA[S.book];
  const bookLabel = bv.label + (S.section ? ' › ' + (bv.sections?.[S.section]?.label || '') : '');

  const factor = S.mode === 'yield'
    ? (S.targetYield && rec.yields?.[0]?.qty ? S.targetYield / rec.yields[0].qty : 1)
    : getFactor();

  // ── Yield card ──────────────────────────────
  let yieldHtml = '';
  if (rec.yields && rec.yields.length) {
    const y = rec.yields[0];
    const scaledY = Math.round(y.qty * factor * 10) / 10;
    const isYieldMode = S.mode === 'yield';
    yieldHtml = `
    <div class="yield-card" id="yc" onclick="toggleYieldMode()">
      <div class="yc-label">🎯 Rendimiento</div>
      <div class="yc-main">
        <span class="yc-qty">${scaledY % 1 === 0 ? scaledY : scaledY.toFixed(1)}</span>
        <span class="yc-unit">${esc(y.label)}</span>
      </div>
      ${rec.yields.length > 1 ? '<div class="yc-hint" style="opacity:.6">+ ' + (rec.yields.length-1) + ' rendimientos más</div>' : ''}
      ${isYieldMode
        ? `<div class="yc-input-row" onclick="event.stopPropagation()">
             <input class="yc-input" id="yi-inp" type="number" value="${S.targetYield}" min="1"
               onchange="setYieldTarget(this.value)" oninput="setYieldTarget(this.value)">
             <span class="yc-unit" style="font-size:13px">${esc(y.label)}</span>
             <button class="yc-clear" onclick="clearYieldMode()">✕ cancelar</button>
           </div>`
        : '<div class="yc-hint">Tocá para calcular por rendimiento</div>'
      }
    </div>`;
  }

  // ── Scale panel ──────────────────────────────
  const allIngs = getAllIngs(rec);
  const baseIng = allIngs.find(i => i.name === S.base);
  const baseQty  = baseIng?.qty;
  const factorPct = factor === 1 ? '1×' : (factor * 100).toFixed(0) + '%';
  const factorLabel = Math.abs(factor - 1) < 0.001 ? 'base' : factorPct;

  const baseOpts = allIngs
    .filter((v, i, a) => a.findIndex(x => x.name === v.name) === i)
    .map(i => `<option value="${esc(i.name)}" ${i.name === S.base ? 'selected' : ''}>${esc(i.name)} (${i.qty}${i.unit})</option>`)
    .join('');

  const bqScaled = baseQty ? baseQty * factor : 0;
  const [bqStr, buStr] = baseQty ? fmt(bqScaled, baseIng.unit) : ['—',''];

  let scalePanelHtml = '';
  if (S.mode !== 'yield') {
    scalePanelHtml = `
    <div class="scale-panel">
      <div class="sp-title">Escalar receta</div>
      <div class="sp-row">
        <span class="sp-label">Base:</span>
        <select class="sp-select" id="base-sel" onchange="changeBase(this.value)">${baseOpts}</select>
      </div>
      <div class="sp-row" style="margin-top:8px">
        <span class="sp-label">Cantidad:</span>
        <input class="sp-qty" id="qty-inp" type="number" value="${S.target ?? baseQty ?? ''}"
          min="0" step="any"
          onchange="changeTarget(this.value)"
          oninput="changeTarget(this.value)">
        <span class="sp-unit">${baseIng ? esc(baseIng.unit) : ''}</span>
        <span class="sp-factor ${factor === 1 ? 'base' : ''}">${factor === 1 ? '1×' : (factor >= 1 ? '×' : '×') + factor.toFixed(2).replace(/\.?0+$/,'')}</span>
        <button class="sp-reset" onclick="resetScale()">Reset</button>
      </div>
    </div>`;
  } else {
    scalePanelHtml = `
    <div class="scale-panel" style="background:#f0f9f7;border-color:var(--teal)">
      <div class="sp-title" style="color:var(--teal)">Modo rendimiento activo</div>
      <div class="sp-row">
        <span class="sp-label">Factor:</span>
        <span class="sp-factor">${factor.toFixed(2).replace(/\.?0+$/,'')}×</span>
        <button class="sp-reset" onclick="clearYieldMode()">Volver a modo base</button>
      </div>
    </div>`;
  }

  // ── Sub-recipes ───────────────────────────────
  let subHtml = '';
  for (const sr of rec.subRecipes || []) {
    const hdr = sr.name
      ? `<div class="ssh">${esc(sr.name)}</div>`
      : '';
    const tbl = renderIngTable(sr.ingredients, factor, S.base);
    const prep = sr.preparation
      ? `<div class="prep">${esc(sr.preparation).replace(/\n/g,'<br>')}</div>`
      : '';
    subHtml += `<div class="sub-section">${hdr}${tbl}${prep}</div>`;
  }

  rv.innerHTML = `
    <div class="rv-hdr">
      <div class="rv-breadcrumb">${esc(bookLabel)}</div>
      <div class="rv-title">${esc(rec.name)}</div>
    </div>
    <div class="rv-body">
      ${yieldHtml}
      ${scalePanelHtml}
      ${subHtml}
    </div>`;
}

/* ── Scale controls ──────────────────────────── */
function changeBase(name) {
  S.base = name;
  S.mode = 'base';
  const allIngs = getAllIngs(S.rec);
  const bi = allIngs.find(i => i.name === name);
  S.target = bi ? bi.qty : S.target;
  renderRecipe();
}

function changeTarget(val) {
  const v = parseFloat(val);
  if (!isNaN(v) && v > 0) { S.target = v; S.mode = 'base'; renderRecipe(); }
}

function resetScale() {
  S.mode = 'base';
  const allIngs = getAllIngs(S.rec);
  const bi = allIngs.find(i => i.name === S.base);
  S.target = bi ? bi.qty : null;
  renderRecipe();
}

function toggleYieldMode() {
  if (S.mode === 'yield') { clearYieldMode(); return; }
  S.mode = 'yield';
  S.targetYield = S.rec.yields?.[0]?.qty || null;
  renderRecipe();
  setTimeout(() => document.getElementById('yi-inp')?.focus(), 50);
}

function setYieldTarget(val) {
  const v = parseFloat(val);
  if (!isNaN(v) && v > 0) { S.targetYield = v; renderRecipe(); }
}

function clearYieldMode() {
  S.mode = 'base'; renderRecipe();
}

/* ── Init ────────────────────────────────────── */
function init() {
  const saved = localStorage.getItem('hba_device');
  if (saved) {
    setDevice(saved);
  } else {
    document.getElementById('dev-modal').classList.remove('hidden');
  }
  buildNav();
}

init();
</script>
